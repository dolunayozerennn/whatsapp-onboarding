<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Onboarding — Canlı Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0e14;
            --bg-grid: #1a1f2c;
            --panel-bg: #11151c;
            --panel-bg-2: #161b25;
            --panel-border: #232a39;
            --text-main: #ffffff;
            --text-muted: #8b9eb5;
            --text-dim: #5a6878;
            --color-success: #10b981;
            --color-warn: #f59e0b;
            --color-info: #00e5ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(var(--bg-grid) 1px, transparent 1px);
            background-size: 22px 22px;
        }

        /* ───── Top mini header ───── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--panel-border);
            background: linear-gradient(to bottom, rgba(11,14,20,0.95), rgba(11,14,20,0.7));
            backdrop-filter: blur(8px);
            z-index: 50;
        }
        .topbar h1 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.3px;
        }
        .topbar .subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-top: 2px;
        }
        .topbar .live-pill {
            display: flex; align-items: center; gap: 8px;
            background: rgba(16,185,129,0.12);
            color: var(--color-success);
            padding: 6px 12px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 500;
            border: 1px solid rgba(16,185,129,0.25);
        }
        .live-pill .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
            animation: livePulse 1.4s infinite;
        }
        @keyframes livePulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* ───── Demo windows row (top half) ───── */
        .demo-row {
            display: flex;
            gap: 14px;
            padding: 18px 28px 10px 28px;
            height: 52%;
            min-height: 320px;
        }

        .demo-window {
            flex: 1;
            min-width: 0;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            overflow: hidden;
            position: relative;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .demo-window.focus {
            border-color: var(--theme-color, #00e5ff);
            box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 0 1px var(--theme-color, #00e5ff), 0 0 30px -8px var(--theme-color, #00e5ff);
        }

        .window-titlebar {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
            border-bottom: 1px solid var(--panel-border);
            user-select: none;
        }
        .traffic-lights { display: flex; gap: 6px; }
        .traffic-lights span {
            width: 11px; height: 11px; border-radius: 50%;
            display: block;
        }
        .traffic-lights span:nth-child(1) { background: #ff5f57; }
        .traffic-lights span:nth-child(2) { background: #ffbd2e; }
        .traffic-lights span:nth-child(3) { background: #28c840; }
        .window-platform {
            display: flex; align-items: center; gap: 8px;
            padding-left: 6px;
        }
        .window-platform-logo {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .window-platform-logo svg { width: 100%; height: 100%; display: block; }
        .window-title {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
            flex: 1;
            margin-right: 50px;
        }
        .window-titlebar.no-platform .window-title { text-align: center; }
        .window-status {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--text-dim);
        }
        .window-status.busy {
            background: rgba(245,158,11,0.15);
            color: var(--color-warn);
        }
        .window-status.busy::before {
            content: '●'; margin-right: 5px;
            animation: livePulse 1s infinite;
        }
        .window-status.done {
            background: rgba(16,185,129,0.15);
            color: var(--color-success);
        }

        .window-body {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        /* Wait overlay */
        .wait-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11,14,20,0.6);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .wait-overlay.show { opacity: 1; }
        .wait-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--panel-border);
            border-top-color: var(--color-info);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wait-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .wait-dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

        /* ───── Bottom flow canvas ───── */
        .flow-canvas {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 50vw;
            scroll-behavior: smooth;
            cursor: grab;
            border-top: 1px solid var(--panel-border);
            background: rgba(0,0,0,0.15);
        }
        .flow-canvas:active { cursor: grabbing; }

        .flow-container {
            display: flex; flex-direction: row; align-items: center;
            min-width: max-content;
        }

        .node-wrapper {
            display: flex; align-items: center;
            opacity: 0.35;
            transform: scale(0.92);
            filter: grayscale(0.6);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .node-wrapper.active { opacity: 1; transform: scale(1.04); filter: grayscale(0); }
        .node-wrapper.completed { opacity: 0.85; transform: scale(1); filter: grayscale(0); }

        .node {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            width: 230px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.45);
            position: relative;
            transition: all 0.3s ease;
        }
        .node-wrapper.active .node {
            border-color: var(--theme-color);
            box-shadow: 0 0 25px rgba(0,0,0,0.5), inset 0 0 0 1px var(--theme-color), 0 0 30px -10px var(--theme-color);
        }
        .node-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--panel-border);
            background: rgba(255,255,255,0.02);
            border-radius: 10px 10px 0 0;
        }
        .node-icon-wrapper {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            box-shadow: 0 0 8px var(--theme-color);
            font-size: 1rem;
        }
        .node-title { font-size: 0.88rem; font-weight: 500; margin: 0; }
        .node-subtitle { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
        .node-body { padding: 12px; }
        .node-desc { font-size: 0.78rem; color: var(--text-muted); margin: 0 0 10px 0; line-height: 1.4; }

        .sub-steps { display: flex; flex-direction: column; gap: 6px; }
        .sub-step {
            font-size: 0.74rem;
            background: rgba(0,0,0,0.25);
            padding: 6px 10px; border-radius: 4px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text-muted);
            opacity: 0; transform: translateX(-8px);
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
        }
        .node-wrapper.active .sub-step.animate-in,
        .node-wrapper.completed .sub-step { opacity: 1; transform: translateX(0); }
        .sub-step.processing {
            border-left-color: var(--color-warn);
            color: var(--text-main);
            background: rgba(245,158,11,0.1);
        }
        .sub-step.completed {
            border-left-color: var(--color-success);
            color: var(--text-main);
            background: rgba(16,185,129,0.08);
        }
        .status-icon { width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--panel-border); }
        .sub-step.processing .status-dot {
            background: var(--color-warn);
            box-shadow: 0 0 6px var(--color-warn);
            animation: pulse 1s infinite;
        }
        .sub-step.completed .status-dot { display: none; }
        .sub-step .status-check { display: none; color: var(--color-success); font-size: 10px; font-weight: 700; }
        .sub-step.completed .status-check { display: block; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.4);opacity:0.5;} }

        /* ───── Connectors with wait badge ───── */
        .connector-wrapper {
            position: relative; width: 80px; height: 40px;
            display: flex; align-items: center;
        }
        .connector-svg { width: 100%; height: 100%; overflow: visible; }
        .connector-path { fill: none; stroke: var(--panel-border); stroke-width: 2; }
        .connector-path-active {
            fill: none; stroke-width: 3;
            stroke-dasharray: 10; stroke-dashoffset: 100;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .connector-wrapper.active .connector-path-active {
            opacity: 1;
            animation: flowData 1s linear infinite;
            filter: drop-shadow(0 0 5px var(--theme-color));
        }
        @keyframes flowData { to { stroke-dashoffset: 0; } }
        .data-packet {
            position: absolute; width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--text-main);
            box-shadow: 0 0 10px var(--text-main);
            top: 50%; transform: translateY(-50%); opacity: 0;
        }
        .connector-wrapper.active .data-packet {
            animation: shootPacket 1.5s cubic-bezier(0.4,0,0.2,1) infinite;
        }
        @keyframes shootPacket {
            0% { left: 0; opacity: 0; transform: translateY(-50%) scale(0.5); }
            10%{ opacity: 1; transform: translateY(-50%) scale(1); }
            90%{ opacity: 1; transform: translateY(-50%) scale(1); }
            100%{ left: 100%; opacity: 0; transform: translateY(-50%) scale(0.5); }
        }
        .connector-wait {
            position: absolute;
            top: -22px; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--color-warn);
            background: rgba(245,158,11,0.12);
            padding: 2px 8px; border-radius: 10px;
            border: 1px solid rgba(245,158,11,0.3);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .connector-wait.show { opacity: 1; }

        /* Node ports */
        .node::before, .node::after {
            content: ''; position: absolute; top: 50%;
            transform: translateY(-50%);
            width: 9px; height: 9px;
            background: var(--bg-grid);
            border: 2px solid var(--text-muted);
            border-radius: 50%; z-index: 2;
        }
        .node::before { left: -5px; }
        .node::after { right: -5px; }
        .node-wrapper:first-child .node::before { display: none; }
        .node-wrapper:last-child .node::after { display: none; }
        .node-wrapper.active .node::after,
        .node-wrapper.completed .node::after {
            border-color: var(--theme-color);
            background: var(--theme-color);
            box-shadow: 0 0 10px var(--theme-color);
        }

        /* ───── Controls ───── */
        .controls {
            position: fixed; bottom: 18px; left: 50%;
            transform: translateX(-50%);
            background: rgba(17,21,28,0.85);
            padding: 8px 18px; border-radius: 28px;
            border: 1px solid var(--panel-border);
            font-size: 0.82rem; color: var(--text-muted);
            display: flex; gap: 14px; align-items: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .key {
            background: var(--panel-border); color: var(--text-main);
            padding: 3px 8px; border-radius: 5px;
            font-size: 0.72rem; font-weight: 600;
        }

        /* ─────────────────────────────────────────── */
        /* WINDOW RENDERERS — type-specific styles    */
        /* ─────────────────────────────────────────── */

        /* Common row enter animation */
        .row-enter { animation: rowIn 0.5s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
        @keyframes rowIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* gmail-inbox */
        .gi-list { display: flex; flex-direction: column; }
        .gi-row {
            display: grid; grid-template-columns: 24px 160px 1fr 70px;
            gap: 12px; align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.85rem;
            transition: background 0.3s ease;
        }
        .gi-row.unread { background: rgba(0,229,255,0.04); }
        .gi-row.unread .gi-from, .gi-row.unread .gi-subject { color: var(--text-main); font-weight: 600; }
        .gi-row.read .gi-from, .gi-row.read .gi-subject { color: var(--text-muted); font-weight: 400; }
        .gi-row.replied { background: rgba(16,185,129,0.06); }
        .gi-row.highlight { background: rgba(0,229,255,0.1); box-shadow: inset 3px 0 0 var(--color-info); }
        .gi-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-info); }
        .gi-row.read .gi-dot, .gi-row.replied .gi-dot { background: transparent; border: 1px solid var(--text-dim); }
        .gi-from { color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gi-subject { color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gi-subject .gi-preview { color: var(--text-dim); font-weight: 400; margin-left: 8px; }
        .gi-time { font-size: 0.72rem; color: var(--text-dim); text-align: right; }
        .gi-tag-replied { color: var(--color-success); font-size: 0.7rem; font-weight: 600; }

        /* gmail-compose */
        .gc-pane { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; height: 100%; }
        .gc-field {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.85rem;
        }
        .gc-field-label { color: var(--text-dim); width: 60px; font-size: 0.78rem; }
        .gc-field-value { color: var(--text-main); flex: 1; }
        .gc-subject { font-weight: 500; }
        .gc-body {
            flex: 1; color: var(--text-main); font-size: 0.88rem;
            line-height: 1.55; padding: 8px 0;
            white-space: pre-wrap;
            font-family: 'Outfit', sans-serif;
        }
        .gc-cursor { display: inline-block; width: 1px; height: 1.1em; background: var(--color-info); vertical-align: text-bottom; animation: blink 0.8s infinite; }
        @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
        .gc-toolbar {
            display: flex; gap: 8px; padding-top: 10px;
            border-top: 1px solid var(--panel-border);
        }
        .gc-send-btn {
            background: linear-gradient(135deg, #00e5ff, #0080ff);
            color: #001824; padding: 8px 18px; border-radius: 6px;
            font-size: 0.82rem; font-weight: 600;
            border: none;
            transition: transform 0.2s ease;
        }
        .gc-send-btn.fire { animation: sendFire 0.7s ease; }
        @keyframes sendFire {
            0%{transform:scale(1);}
            40%{transform:scale(1.08);}
            100%{transform:scale(0); opacity:0;}
        }
        .gc-sent-banner {
            background: rgba(16,185,129,0.12);
            color: var(--color-success);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        .gc-sent-banner.show { display: block; animation: rowIn 0.5s ease; }

        /* spreadsheet */
        .ss-grid { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .ss-grid th, .ss-grid td {
            padding: 9px 12px;
            border-right: 1px solid var(--panel-border);
            border-bottom: 1px solid var(--panel-border);
            text-align: left;
            color: var(--text-main);
        }
        .ss-grid th {
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            font-size: 0.74rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            position: sticky; top: 0; z-index: 1;
        }
        .ss-grid td.idx {
            background: rgba(255,255,255,0.02);
            color: var(--text-dim);
            text-align: center;
            font-size: 0.72rem;
            width: 32px;
        }
        .ss-grid tr.highlight td:not(.idx) {
            background: rgba(0,229,255,0.08);
            box-shadow: inset 3px 0 0 var(--color-info);
        }
        .ss-grid td.highlight-cell {
            background: rgba(245,158,11,0.15) !important;
            box-shadow: inset 0 0 0 1px var(--color-warn);
        }
        .ss-grid .badge {
            font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
            font-weight: 600;
        }
        .ss-grid .badge.success { background: rgba(16,185,129,0.15); color: var(--color-success); }
        .ss-grid .badge.warn    { background: rgba(245,158,11,0.15); color: var(--color-warn); }
        .ss-grid .badge.info    { background: rgba(0,229,255,0.15); color: var(--color-info); }
        .ss-grid .badge.muted   { background: rgba(255,255,255,0.05); color: var(--text-muted); }

        /* chat */
        .ch-thread { padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
        .ch-msg {
            max-width: 78%;
            padding: 9px 13px;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .ch-msg.them {
            align-self: flex-start;
            background: var(--panel-bg-2);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }
        .ch-msg.me {
            align-self: flex-end;
            background: linear-gradient(135deg, #00e5ff, #0080ff);
            color: #001824;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }
        .ch-meta { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
        .ch-typing {
            align-self: flex-start;
            background: var(--panel-bg-2);
            padding: 10px 14px;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            display: inline-flex; gap: 4px;
        }
        .ch-typing span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.2s infinite;
        }
        .ch-typing span:nth-child(2){ animation-delay: 0.2s; }
        .ch-typing span:nth-child(3){ animation-delay: 0.4s; }
        @keyframes typing {
            0%,60%,100%{ transform: translateY(0); opacity:0.4; }
            30%{ transform: translateY(-4px); opacity:1; }
        }

        /* image-canvas */
        .ic-wrap { padding: 16px; height: 100%; display: flex; flex-direction: column; gap: 10px; }
        .ic-prompt {
            font-size: 0.78rem; color: var(--text-muted);
            background: var(--panel-bg-2);
            padding: 8px 12px; border-radius: 6px;
            border-left: 2px solid var(--color-info);
        }
        .ic-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            min-height: 0;
        }
        .ic-tile {
            background: var(--panel-bg-2);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .ic-tile.skeleton {
            background: linear-gradient(110deg, #1a1f2c 8%, #232a39 18%, #1a1f2c 33%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
        .ic-tile.done {
            background: linear-gradient(135deg, var(--theme-color, #00e5ff), #6366f1);
            animation: tileReveal 0.6s cubic-bezier(0.2, 0.8, 0.3, 1.2);
        }
        .ic-tile.done::before {
            content: attr(data-emoji);
            font-size: 2.6rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .ic-tile.done.image {
            background-size: cover;
            background-position: center;
        }
        .ic-tile.done.image::before { content: ''; }
        @keyframes tileReveal {
            from { opacity: 0; transform: scale(0.92); filter: blur(6px); }
            to   { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        .ic-tile-label {
            position: absolute; bottom: 6px; left: 8px; right: 8px;
            font-size: 0.7rem;
            color: var(--text-main);
            background: rgba(0,0,0,0.55);
            padding: 3px 6px; border-radius: 4px;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        /* video-canvas */
        .vc-wrap { padding: 16px; height: 100%; display: flex; flex-direction: column; gap: 12px; }
        .vc-screen {
            flex: 1;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            min-height: 0;
        }
        .vc-screen .vc-poster {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, var(--theme-color, #00e5ff), #6366f1);
            color: #fff;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .vc-screen .vc-poster.image {
            background-size: cover;
            background-position: center;
        }
        .vc-screen.rendering::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }
        .vc-screen.playing .vc-play-icon { opacity: 0; }
        .vc-play-icon {
            position: absolute;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            transition: opacity 0.4s ease;
        }
        .vc-timeline {
            display: flex; gap: 4px; height: 44px;
        }
        .vc-frame {
            flex: 1; min-width: 0;
            background: var(--panel-bg-2);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            opacity: 0.4;
            border: 1px solid var(--panel-border);
        }
        .vc-frame.added {
            opacity: 1;
            background: linear-gradient(135deg, var(--theme-color, #00e5ff), #6366f1);
        }
        .vc-frame.added.image {
            background-size: cover;
            background-position: center;
        }
        .vc-progress {
            height: 3px;
            background: var(--panel-border);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .vc-progress-bar {
            height: 100%; width: 0%;
            background: var(--color-info);
            transition: width 0.4s ease;
        }

        /* browser */
        .br-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            background: var(--panel-bg-2);
            border-bottom: 1px solid var(--panel-border);
        }
        .br-btns { display: flex; gap: 6px; color: var(--text-dim); font-size: 0.9rem; }
        .br-url {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 5px 12px;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .br-content { padding: 16px 20px; font-size: 0.85rem; line-height: 1.5; }
        .br-result {
            padding: 10px 0;
            border-bottom: 1px solid var(--panel-border);
        }
        .br-result-title { color: var(--color-info); font-weight: 500; margin-bottom: 3px; }
        .br-result-url { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
        .br-result-snippet { color: var(--text-muted); font-size: 0.8rem; }

        /* social-post */
        .sp-pane { padding: 16px 18px; }
        .sp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .sp-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700; color: #fff;
        }
        .sp-name { font-weight: 600; font-size: 0.88rem; }
        .sp-handle { font-size: 0.78rem; color: var(--text-muted); }
        .sp-text {
            font-size: 0.92rem; line-height: 1.5; color: var(--text-main);
            white-space: pre-wrap;
            min-height: 80px;
        }
        .sp-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 14px; margin-top: 14px;
            border-top: 1px solid var(--panel-border);
        }
        .sp-counter { font-size: 0.78rem; color: var(--text-muted); }
        .sp-counter.ok { color: var(--color-success); }
        .sp-post-btn {
            background: var(--text-main); color: #000;
            padding: 7px 18px; border-radius: 16px;
            font-size: 0.82rem; font-weight: 700;
            border: none;
        }
        .sp-posted {
            margin-top: 12px;
            background: rgba(16,185,129,0.12);
            color: var(--color-success);
            padding: 8px 12px; border-radius: 6px;
            font-size: 0.82rem; font-weight: 500;
            text-align: center;
            display: none;
        }
        .sp-posted.show { display: block; animation: rowIn 0.4s ease; }

        /* crm-card */
        .crm-pane { padding: 18px; }
        .crm-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .crm-name { font-size: 1.05rem; font-weight: 600; }
        .crm-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .crm-status {
            padding: 5px 12px; border-radius: 14px;
            font-size: 0.72rem; font-weight: 600;
        }
        .crm-status.new { background: rgba(0,229,255,0.15); color: var(--color-info); }
        .crm-status.qualified { background: rgba(245,158,11,0.15); color: var(--color-warn); }
        .crm-status.won { background: rgba(16,185,129,0.15); color: var(--color-success); }
        .crm-status.lost { background: rgba(239,68,68,0.15); color: #f87171; }
        .crm-fields { display: grid; grid-template-columns: 100px 1fr; gap: 10px 14px; }
        .crm-fk { font-size: 0.78rem; color: var(--text-dim); }
        .crm-fv { font-size: 0.85rem; color: var(--text-main); }
        .crm-fv.fade-in { animation: rowIn 0.4s ease; }

        /* notion-doc */
        .nd-pane { padding: 24px 28px; max-width: 100%; }
        .nd-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 16px; }
        .nd-block { font-size: 0.9rem; line-height: 1.55; color: var(--text-main); margin-bottom: 12px; }
        .nd-block.h2 { font-size: 1.05rem; font-weight: 600; margin-top: 18px; margin-bottom: 8px; }
        .nd-block.bullet { padding-left: 18px; position: relative; }
        .nd-block.bullet::before { content: '•'; position: absolute; left: 4px; color: var(--text-muted); }
        .nd-block.fade-in { animation: rowIn 0.5s ease; }

        /* terminal */
        .tm-pane {
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.55;
            background: #07090e;
        }
        .tm-line { color: var(--text-main); white-space: pre-wrap; }
        .tm-line.cmd::before { content: '$ '; color: var(--color-success); }
        .tm-line.out { color: var(--text-muted); }
        .tm-line.err { color: #f87171; }
        .tm-line.fade-in { animation: rowIn 0.3s ease; }

        /* generic html (fallback) */
        .gen-pane { padding: 18px; }

        /* Empty state */
        .empty-state {
            height: 100%;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .empty-state-icon { font-size: 2.4rem; opacity: 0.3; }
    </style>
</head>

    <script>
    /* ─────────────────────────────────────────
       WINDOWS MANIFEST — top demo windows
       Each window: { id, type, title }

         gmail-inbox, gmail-compose, spreadsheet, chat,
         image-canvas, video-canvas, browser, social-post,

    const windowsManifest = /*__WINDOWS_DATA__*/[
        { id: 'A', type: 'crm-card', platform: 'notion', title: 'Notion CRM — Üye Kartı' },
        { id: 'B', type: 'chat', platform: 'whatsapp', title: 'WhatsApp — Eğitim Hattı' }
    ]/*__WINDOWS_DATA_END__*/

    /* ─────────────────────────────────────────
       NODES — bottom flow + per-step window frames
       Each node: { title, desc, icon, subSteps, waitMs, waitLabel, frames }
       frames = { [windowId]: action }   // applied when step becomes active
       ───────────────────────────────────────── */
    const nodesData = /*__NODES_DATA__*/[
        {
            title: 'Skool Kaydı',
            desc: 'Yeni üye AI Factory\'ye katıldı, sistem tetiklendi.',
            icon: '🎓',
            subSteps: ['Üyelik alındı', 'Kayıt sisteme düştü'],
            frames: { A: { action: 'open', name: 'Mehmet Yıldırım', sub: 'AI Factory — yeni üye', status: 'new', fields: [{ k: 'Plan', v: 'Yıllık' }] } }
        },
        {
            title: 'Numara Doğrulandı',
            desc: 'Üyenin telefonu kontrol edildi, onboarding kanalı açıldı.',
            icon: '📞',
            subSteps: ['Telefon okundu', 'Format doğrulandı'],
            frames: { A: { action: 'fill', field: 'Telefon', value: '+90 532 *** 1842' } }
        },
        {
            title: 'Gün 0 — Hoş Geldin',
            desc: 'Aynı gün karşılama mesajı ve giriş videosu WhatsApp\'a düşer.',
            icon: '👋',
            subSteps: ['Karşılama hazırlandı', 'WhatsApp\'a iletildi'],
            waitMs: 900,
            waitLabel: 'WhatsApp\'a gönderiliyor',
            frames: {
                A: { action: 'status', status: 'qualified' },
                B: { action: 'message', side: 'me', text: 'Merhaba Mehmet! 👋 AI Factory\'ye hoş geldin. 7 gün boyunca her öğlen sana bir video düşecek. İlki yolda 🎬', meta: 'AI Factory' }
            }
        },

            desc: 'Ertesi gün öğlen ilk eğitim videosu otomatik gönderilir.',
            icon: '🎬',
            subSteps: ['Sıradaki video seçildi', 'Üyeye iletildi'],
            frames: {
                A: { action: 'fill', field: 'İlerleme', value: 'Gün 0 izlendi ✓' },
                B: { action: 'message', side: 'me', text: '1. gün 🎬 Bugün Antigravity nedir, nasıl açılır onu öğreniyoruz. Video aşağıda 👇', meta: 'AI Factory' }
            }
        },
        {
            title: 'Üye Soru Soruyor',
            desc: 'Mehmet videoyu izledi, takıldığı yeri yazdı.',
            icon: '💭',
            subSteps: ['Mesaj alındı', 'Soru tespit edildi'],
            frames: {
                A: { action: 'fill', field: 'Son Aktivite', value: 'Soru sordu' },
                B: { action: 'message', side: 'them', text: 'Bot çalıştı ama API key\'i nereye girmem gerekiyor?', meta: 'Mehmet' }
            }
        },
        {
            title: 'Asistan Cevap Veriyor',
            desc: 'Bot soruyu okur, doğru klasörü ve adımı anında yanıtlar.',
            icon: '🤖',
            subSteps: ['Soru anlaşıldı', 'Cevap üretildi', 'Gönderildi'],
            waitMs: 1100,
            waitLabel: 'Asistan cevap hazırlıyor',
            frames: {
                B: { action: 'message', side: 'me', text: 'Harika soru Mehmet 👇 .env dosyasının en üstüne OPENAI_API_KEY=... satırını ekle, sonra botu yeniden başlat. Eğer takılırsan ekran görüntüsü at, beraber bakalım.', meta: 'AI Factory' }
            }
        },
        {
            title: 'Gün 2-4 — Drip Devam',
            desc: 'Sonraki üç gün boyunca her öğlen sıradaki video otomatik düşer.',
            icon: '📅',
            subSteps: ['Gün 2 gönderildi', 'Gün 3 gönderildi', 'Gün 4 gönderildi'],
            frames: {
                A: { action: 'set-field', field: 'İlerleme', value: 'Gün 1-2-3-4 izlendi ✓' },
                B: { action: 'message', side: 'me', text: '4. gün ⚡ Bugüne kadar 4 video birikti. Bugünkü konu: kendi botunu Telegram\'a kurmak. İzlemeye hazır mısın?', meta: 'AI Factory' }
            }
        },
        {
            title: 'Gün 5-6 — Üye Üretiyor',
            desc: 'Mehmet öğrendiğini uygular, sonucunu paylaşır; bot tebrik eder.',
            icon: '⚡',
            subSteps: ['Üye proje paylaştı', 'Bot geri bildirim verdi'],
            frames: {
                A: { action: 'set-field', field: 'Son Aktivite', value: 'Kendi botunu paylaştı 🚀' },
                B: { action: 'message', side: 'them', text: 'İlk botum çalıştı, Skool\'a da attım! 🎉', meta: 'Mehmet' }
            }
        },
        {
            title: 'Gün 7 — Final',
            desc: 'Son video gönderilir, üye aktif kullanıcı statüsüne yükseltilir.',
            icon: '🏁',
            subSteps: ['Final videosu iletildi', 'CRM güncellendi'],
            frames: {
                A: { action: 'status', status: 'won' },
                B: { action: 'message', side: 'me', text: '7. gün 🏁 Tebrikler Mehmet, onboarding tamam! Topluluk kanalında diğer üyelerle buluşalım. Burada her zaman yanındayız.', meta: 'AI Factory' }
            }
        }
    ]/*__NODES_DATA_END__*/

    /* ─────────────────────────────────────────
       Window renderers
       Each renderer: { init(state), apply(state, action), render(state, container) }
       ───────────────────────────────────────── */
    const renderers = {
        'gmail-inbox': {
            init: () => ({ rows: [], highlight: -1 }),
            apply: (s, a) => {
                if (!a) return s;
                const ns = { rows: s.rows.slice(), highlight: s.highlight };
                if (a.action === 'add-row') {
                    ns.rows.push({ ...a.row, _new: true });
                    ns.highlight = ns.rows.length - 1;
                } else if (a.action === 'highlight') {
                    ns.highlight = a.index;
                } else if (a.action === 'mark') {
                    if (ns.rows[a.index]) ns.rows[a.index] = { ...ns.rows[a.index], tag: a.tag, _new: false };
                } else if (a.action === 'reset') {
                    return { rows: [], highlight: -1 };
                }
                return ns;
            },
            render: (s, el) => {
                if (!s.rows.length) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div>Gelen kutusu boş</div></div>`;
                    return;
                }
                el.innerHTML = `<div class="gi-list">${s.rows.map((r, i) => `
                    <div class="gi-row ${r.tag || 'unread'} ${i === s.highlight ? 'highlight' : ''} ${r._new ? 'row-enter' : ''}">
                        <div class="gi-dot"></div>
                        <div class="gi-from">${r.from || ''}</div>
                        <div class="gi-subject">${r.subject || ''}<span class="gi-preview"> — ${r.preview || ''}</span></div>
                        <div class="gi-time">${r.tag === 'replied' ? '<span class="gi-tag-replied">↩ Yanıtlandı</span>' : (r.time || '')}</div>
                    </div>`).join('')}</div>`;
            }
        },

        'gmail-compose': {
            init: () => ({ to: '', subject: '', body: '', sent: false, typingBody: false }),
            apply: (s, a) => {
                if (!a) return s;
                if (a.action === 'open')        return { ...s, to: a.to || '', subject: a.subject || '', body: '', sent: false, typingBody: false };
                if (a.action === 'type-body')   return { ...s, body: a.body || '', typingBody: true };
                if (a.action === 'set-subject') return { ...s, subject: a.subject || '' };
                if (a.action === 'send')        return { ...s, sent: true, typingBody: false };
                if (a.action === 'clear')       return { to: '', subject: '', body: '', sent: false, typingBody: false };
                return s;
            },
            render: (s, el) => {
                if (!s.to && !s.subject && !s.body && !s.sent) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✏️</div><div>Yanıt bekleniyor…</div></div>`;
                    return;
                }
                if (s.sent) {
                    el.innerHTML = `<div class="gc-pane">
                        <div class="gc-field"><div class="gc-field-label">Kime</div><div class="gc-field-value">${s.to}</div></div>
                        <div class="gc-field"><div class="gc-field-label">Konu</div><div class="gc-field-value gc-subject">${s.subject}</div></div>
                        <div class="gc-body">${s.body}</div>
                        <div class="gc-sent-banner show">✓ Gönderildi</div>
                    </div>`;
                    return;
                }
                el.innerHTML = `<div class="gc-pane">
                    <div class="gc-field"><div class="gc-field-label">Kime</div><div class="gc-field-value">${s.to}</div></div>
                    <div class="gc-field"><div class="gc-field-label">Konu</div><div class="gc-field-value gc-subject">${s.subject}</div></div>
                    <div class="gc-body" id="gcBody"></div>
                    <div class="gc-toolbar"><button class="gc-send-btn">Gönder ›</button></div>
                </div>`;
                if (s.typingBody) {
                    typewriter(el.querySelector('#gcBody'), s.body);
                } else {
                    const b = el.querySelector('#gcBody');
                    if (b) b.textContent = s.body;
                }
            }
        },

        'spreadsheet': {
            init: () => ({ headers: [], rows: [], highlightRow: -1, highlightCell: null }),
            apply: (s, a) => {
                if (!a) return s;
                if (a.action === 'set-headers') return { ...s, headers: a.headers || [] };
                if (a.action === 'add-row') {
                    const rows = s.rows.concat([{ cells: a.row || [], _new: true }]);
                    return { ...s, rows, highlightRow: rows.length - 1, highlightCell: null };
                }
                if (a.action === 'highlight') return { ...s, highlightRow: a.row ?? -1, highlightCell: a.cell || null };
                if (a.action === 'update-cell') {
                    const rows = s.rows.map((r, i) => {
                        if (i !== a.row) return r;
                        const cells = r.cells.slice();
                        cells[a.col] = a.value;
                        return { ...r, cells, _new: false };
                    });
                    return { ...s, rows, highlightCell: { row: a.row, col: a.col } };
                }
                if (a.action === 'reset') return { headers: s.headers, rows: [], highlightRow: -1, highlightCell: null };
                return s;
            },
            render: (s, el) => {
                if (!s.headers.length && !s.rows.length) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📊</div><div>Tablo boş</div></div>`;
                    return;
                }
                const headTh = ['<th class="idx">#</th>'].concat((s.headers || []).map(h => `<th>${h}</th>`)).join('');
                const rowsHtml = s.rows.map((r, i) => {
                    const tds = r.cells.map((c, j) => {
                        const isHL = s.highlightCell && s.highlightCell.row === i && s.highlightCell.col === j;
                        return `<td class="${isHL ? 'highlight-cell' : ''}">${formatCell(c)}</td>`;
                    }).join('');
                    return `<tr class="${i === s.highlightRow ? 'highlight' : ''} ${r._new ? 'row-enter' : ''}">
                        <td class="idx">${i + 1}</td>${tds}</tr>`;
                }).join('');
                el.innerHTML = `<table class="ss-grid"><thead><tr>${headTh}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
            }
        },

        'chat': {
            init: () => ({ messages: [], typing: null }),
            apply: (s, a) => {
                if (!a) return s;
                if (a.action === 'message') {
                    return { messages: s.messages.concat([{ side: a.side || 'them', text: a.text || '', meta: a.meta, _new: true }]), typing: null };
                }
                if (a.action === 'typing')      return { ...s, typing: a.side || 'them' };
                if (a.action === 'stop-typing') return { ...s, typing: null };
                if (a.action === 'reset')       return { messages: [], typing: null };
                return s;
            },
            render: (s, el) => {
                if (!s.messages.length && !s.typing) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><div>Konuşma başlamadı</div></div>`;
                    return;
                }
                const msgs = s.messages.map(m => `
                    ${m.meta ? `<div class="ch-meta">${m.meta}</div>` : ''}
                    <div class="ch-msg ${m.side} ${m._new ? 'row-enter' : ''}">${m.text}</div>`).join('');
                const typingHtml = s.typing ? `<div class="ch-typing"><span></span><span></span><span></span></div>` : '';
                el.innerHTML = `<div class="ch-thread">${msgs}${typingHtml}</div>`;
                el.scrollTop = el.scrollHeight;
            }
        },

        'image-canvas': {
            init: () => ({ prompt: '', tiles: [] }),
            apply: (s, a) => {
                if (!a) return s;
                if (a.action === 'prompt') return { ...s, prompt: a.prompt || '' };
                if (a.action === 'generate') {
                    const tiles = (a.tiles || []).map(t => ({ ...t, status: 'loading' }));
                    return { ...s, tiles, prompt: a.prompt ?? s.prompt };
                }
                if (a.action === 'finish') {
                    return { ...s, tiles: s.tiles.map(t => ({ ...t, status: 'done' })) };
                }
                if (a.action === 'reset') return { prompt: '', tiles: [] };
                return s;
            },
            render: (s, el) => {
                if (!s.prompt && !s.tiles.length) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🖼️</div><div>Görsel bekleniyor</div></div>`;
                    return;
                }
                const promptHtml = s.prompt ? `<div class="ic-prompt">"${s.prompt}"</div>` : '';
                const tilesHtml = s.tiles.map(t => {
                    if (t.status === 'done') {
                        if (t.image) {
                            return `<div class="ic-tile done image" style="background-image:url('${t.image}')">${t.label ? `<div class="ic-tile-label">${t.label}</div>` : ''}</div>`;
                        }
                        return `<div class="ic-tile done" data-emoji="${t.emoji || '🖼️'}"><div class="ic-tile-label">${t.label || ''}</div></div>`;
                    }

        'video-canvas': {

                    return { ...s, frames: s.frames.concat([{ emoji: a.emoji || '🎞️', image: a.image || null }]) };

                    ? `<div class="vc-poster image" style="background-image:url('${s.posterImage}')"></div>`
                    : `<div class="vc-poster">${s.posterEmoji}</div>`;

                    <div class="vc-screen ${s.rendering ? 'rendering' : ''} ${s.playing ? 'playing' : ''}">

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function formatCell(c) {
        if (c == null) return '';
        if (typeof c === 'object' && c.badge) return `<span class="badge ${c.badge}">${c.text}</span>`;
        return String(c);
    }
    let typewriterToken = 0;
    function typewriter(el, text, speed = 32) {
        if (!el) return;
        const myToken = ++typewriterToken;
        el.textContent = '';
        const cursor = document.createElement('span');
        cursor.className = 'gc-cursor';
        el.appendChild(cursor);
        let i = 0;
        const step = () => {
            if (myToken !== typewriterToken) return;
            if (i < text.length) {
                cursor.insertAdjacentText('beforebegin', text.charAt(i));
                i++;
                setTimeout(step, speed);
            }
        };
        step();
    }

    function platformLogoHtml(name) {
        if (!name) return '';
        const svg = platformLogos[name];
        if (!svg) return `<div class="window-platform-logo" style="background:#334155;color:#fff;font-size:11px;font-weight:700;">${name.charAt(0).toUpperCase()}</div>`;
        return `<div class="window-platform-logo">${svg}</div>`;
    }

    function buildWindows() {
        demoRow.innerHTML = '';
        windowsManifest.forEach((w, i) => {
            const color = themeColors[i % themeColors.length];
            const wrap = document.createElement('div');
            wrap.className = 'demo-window';
            wrap.style.setProperty('--theme-color', color);
            wrap.dataset.windowId = w.id;
            const logo = platformLogoHtml(w.platform);
            wrap.innerHTML = `
                <div class="window-titlebar ${w.platform ? '' : 'no-platform'}">
                    <div class="traffic-lights"><span></span><span></span><span></span></div>
                    ${logo}
                    <div class="window-title">${w.title || w.type}</div>
                    <div class="window-status" data-status>idle</div>
                </div>
                <div class="window-body" data-body></div>
                <div class="wait-overlay" data-wait>
                    <div class="wait-spinner"></div>
                    <div class="wait-label"><span data-wait-label>İşleniyor</span><span class="wait-dots"></span></div>
                </div>`;
            demoRow.appendChild(wrap);
            windowEls[w.id] = {
                wrap,
                titlebarStatus: wrap.querySelector('[data-status]'),
                body: wrap.querySelector('[data-body]'),
                waitOverlay: wrap.querySelector('[data-wait]'),
                waitLabel: wrap.querySelector('[data-wait-label]')

        });
    }

    function clearAllWaitOverlays() {
        for (const id in windowEls) {
            const el = windowEls[id];
            if (el && el.waitOverlay) el.waitOverlay.classList.remove('show');
        }
        document.querySelectorAll('[data-wait-badge]').forEach(b => b.classList.remove('show'));
    }

    // Compute window state at step k (recompute from start — supports backward nav)
    function windowStateAt(windowId, stepIndex) {
        const w = windowsManifest.find(x => x.id === windowId);
        if (!w) return null;
        const r = renderers[w.type];
        if (!r) return null;
        let state = r.init();
        for (let i = 0; i <= stepIndex && i < nodesData.length; i++) {
            const action = nodesData[i].frames && nodesData[i].frames[windowId];
            // Strip `_new` flags from previous steps so only the current step animates
            if (i < stepIndex) {
                state = stripNew(r.apply(state, action));
            } else {
                state = r.apply(state, action);
            }
        }
        return state;
    }
    function stripNew(s) {
        if (!s || typeof s !== 'object') return s;
        const out = Array.isArray(s) ? [] : {};
        for (const k in s) {
            const v = s[k];
            if (Array.isArray(v)) out[k] = v.map(item => (item && typeof item === 'object') ? { ...item, _new: false } : item);
            else if (v && typeof v === 'object' && '_new' in v) out[k] = { ...v, _new: false };
            else out[k] = v;
        }
        return out;
    }

    // Render all windows for current step
    function renderWindows() {
        windowsManifest.forEach(w => {
            const r = renderers[w.type];
            const el = windowEls[w.id];
            if (!r || !el) return;
            const state = currentIndex < 0 ? r.init() : windowStateAt(w.id, currentIndex);
            r.render(state, el.body);

            // Status badge — busy if this step has an action for this window
            const action = currentIndex >= 0 && nodesData[currentIndex].frames ? nodesData[currentIndex].frames[w.id] : null;
            const statusEl = el.titlebarStatus;
            statusEl.classList.remove('busy', 'done');
            if (action) { statusEl.classList.add('busy'); statusEl.textContent = 'işliyor'; }
            else if (currentIndex >= 0) { statusEl.classList.add('done'); statusEl.textContent = 'hazır'; }
            else { statusEl.textContent = 'idle'; }

            // Focus glow when this window has an action this step
            el.wrap.classList.toggle('focus', !!action);
        });
    }

    // Build flow nodes (existing visual)
    function renderNodes() {
        flowContainer.innerHTML = '';
        nodesData.forEach((data, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'node-wrapper';
            wrapper.id = `node-${index}`;
            const color = themeColors[index % themeColors.length];
            wrapper.style.setProperty('--theme-color', color);

            let subStepsHtml = '';
            if (data.subSteps && data.subSteps.length) {
                subStepsHtml = `<div class="sub-steps">` + data.subSteps.map((step, sIdx) => `
                    <div class="sub-step" id="substep-${index}-${sIdx}">
                        <div class="status-icon"><div class="status-dot"></div><div class="status-check">✓</div></div>
                        <span>${step}</span>
                    </div>`).join('') + `</div>`;
            }

            wrapper.innerHTML = `
                <div class="node">
                    <div class="node-header">
                        <div class="node-icon-wrapper"><span class="node-icon">${data.icon}</span></div>
                        <div>
                            <h3 class="node-title">${data.title}</h3>
                            <div class="node-subtitle">Adım ${index + 1}</div>
                        </div>
                    </div>
                    <div class="node-body">
                        <p class="node-desc">${data.desc || ''}</p>
                        ${subStepsHtml}
                    </div>
                </div>`;
            flowContainer.appendChild(wrapper);

            if (index < nodesData.length - 1) {
                const connector = document.createElement('div');
                connector.className = 'connector-wrapper';
                connector.id = `connector-${index}`;
                const nextWaitLabel = nodesData[index + 1].waitLabel || (nodesData[index + 1].waitMs ? 'Bekleniyor…' : '');
                connector.innerHTML = `
                    <svg class="connector-svg" preserveAspectRatio="none">
                        <path class="connector-path" d="M 0 20 C 40 20, 40 20, 80 20"></path>
                        <path class="connector-path-active" d="M 0 20 C 40 20, 40 20, 80 20" style="--theme-color: ${color}"></path>
                    </svg>
                    <div class="data-packet" style="--theme-color: ${color}"></div>
                    ${nextWaitLabel ? `<div class="connector-wait" data-wait-badge>⏳ ${nextWaitLabel}</div>` : ''}`;
                flowContainer.appendChild(connector);
            }
        });

        setTimeout(() => {
            if (nodesData.length) {
                centerOnElement(document.getElementById('node-0'));
                setTimeout(nextNode, 250);
            }
        }, 80);
    }

    function centerOnElement(el) {
        if (!el) return;
        const elRect = el.getBoundingClientRect();
        const canvasRect = flowCanvas.getBoundingClientRect();
        const target = flowCanvas.scrollLeft + (elRect.left - canvasRect.left) - (canvasRect.width / 2) + (elRect.width / 2);
        flowCanvas.scrollTo({ left: target, behavior: 'smooth' });
    }

    async function updateFlowState() {
        const wrappers = document.querySelectorAll('.node-wrapper');
        const connectors = document.querySelectorAll('.connector-wrapper');

        wrappers.forEach((el, idx) => {
            el.classList.remove('active', 'completed');
            if (idx < currentIndex) {
                el.classList.add('completed');
                el.querySelectorAll('.sub-step').forEach(s => {
                    s.classList.add('animate-in', 'completed');
                    s.classList.remove('processing');
                });
            } else if (idx === currentIndex) {
                el.classList.add('active');
                centerOnElement(el);
            } else {
                el.querySelectorAll('.sub-step').forEach(s => {
                    s.classList.remove('animate-in', 'processing', 'completed');
                });
            }
        });

        connectors.forEach((el, idx) => {
            el.classList.remove('active');
            const badge = el.querySelector('[data-wait-badge]');
            if (badge) badge.classList.remove('show');
            if (idx < currentIndex) el.classList.add('active');
        });
    }

    async function animateSubSteps(nodeIndex, subSteps, token) {
        for (let i = 0; i < subSteps.length; i++) {
            if (token !== stepLockToken) return;
            const stepEl = document.getElementById(`substep-${nodeIndex}-${i}`);
            if (!stepEl) return;
            stepEl.classList.add('animate-in', 'processing');
            await sleep(1100 + Math.random() * 700);
            if (token !== stepLockToken) return;
            stepEl.classList.remove('processing');
            stepEl.classList.add('completed');
        }
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function showWait(stepIndex, ms, label, token) {
        const data = nodesData[stepIndex];
        const focused = data.frames ? Object.keys(data.frames) : [];
        focused.forEach(id => {
            const el = windowEls[id];
            if (!el) return;
            el.waitLabel.textContent = label || 'İşleniyor';
            el.waitOverlay.classList.add('show');
        });
        const prevConnector = document.getElementById(`connector-${stepIndex - 1}`);
        const badge = prevConnector && prevConnector.querySelector('[data-wait-badge]');
        if (badge) badge.classList.add('show');

        await sleep(ms);
        // Always clear overlays on this set, even if token changed (defensive)
        focused.forEach(id => windowEls[id] && windowEls[id].waitOverlay.classList.remove('show'));
        if (badge) badge.classList.remove('show');
    }

    async function applyStep(targetIndex) {
        const token = ++stepLockToken;
        clearAllWaitOverlays();   // hard reset on every nav — eliminates stuck overlays
        currentIndex = targetIndex;
        await updateFlowState();
        renderWindows();

        const data = nodesData[targetIndex];
        if (!data) return;

        if (data.waitMs && data.waitMs > 0) {
            await showWait(targetIndex, data.waitMs * 1.5, data.waitLabel, token);
            if (token !== stepLockToken) return;
        }

        if (data.subSteps && data.subSteps.length) {
            animateSubSteps(targetIndex, data.subSteps, token);
        }
    }

    function nextNode() { if (currentIndex < nodesData.length - 1) applyStep(currentIndex + 1); }
    function prevNode() { if (currentIndex > 0) applyStep(currentIndex - 1); else if (currentIndex === 0) applyStep(-1); }

    window.addEventListener('keydown', (e) => {
        if (['Space', 'ArrowRight'].includes(e.code)) { e.preventDefault(); nextNode(); }
        if (['ArrowLeft'].includes(e.code))           { e.preventDefault(); prevNode(); }
    });

    // Drag to scroll
    let isDown = false, startX, scrollStart;
    flowCanvas.addEventListener('mousedown', e => { isDown = true; startX = e.pageX - flowCanvas.offsetLeft; scrollStart = flowCanvas.scrollLeft; flowCanvas.style.cursor = 'grabbing'; });
    flowCanvas.addEventListener('mouseleave', () => { isDown = false; flowCanvas.style.cursor = 'grab'; });
    flowCanvas.addEventListener('mouseup',    () => { isDown = false; flowCanvas.style.cursor = 'grab'; });
    flowCanvas.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        flowCanvas.scrollLeft = scrollStart - ((e.pageX - flowCanvas.offsetLeft) - startX);
    });

    buildWindows();
    renderNodes();
    renderWindows();
    </script>
</body>
</html>
